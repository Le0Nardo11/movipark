<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="css/menu.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | MoviPark</title>
    <script src="js/logo-component.js" defer></script>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
<div id="menu-container"></div>

<script>
fetch("components/menu.html")
.then(response => response.text())
.then(data => {
document.getElementById("menu-container").innerHTML = data
})
</script>

<script src="js/menu.js"></script>
<div class="register-container">
    <movipark-logo></movipark-logo>

    <h2 class="register-title">Registro</h2>

    <form class="register-form" id="registerForm">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Ingresa tu nombre" required>

        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" placeholder="Ingresa tu apellido" required>

        <label for="correo">Correo</label>
        <input type="email" id="correo" placeholder="Ingresa tu correo" required>

        <div class="row">
            <div class="field">
                <label for="edad">Edad</label>
                <select id="edad" required>
                    <option value="">Selecciona</option>
                    <script>
                        for (let i = 15; i <= 40; i++) {
                            document.write(`<option value="${i}">${i}</option>`);
                        }
                    </script>
                </select>
            </div>

            <div class="field">
                <label for="sexo">Sexo</label>
                <select id="sexo" required>
                    <option value="">Selecciona</option>
                    <option>Masculino</option>
                    <option>Femenino</option>
                </select>
            </div>
        </div>

        <label for="ocupacion">Ocupación</label>
        <input type="text" id="ocupacion" placeholder="Ingresa tu ocupación" required>

        <button type="submit" class="btn-primary">Finalizar</button>
    </form>
</div>

<script>
    const form = document.getElementById('registerForm');

    form.addEventListener('submit', function(event) {
        event.preventDefault(); // Evita que se recargue la página

        // Puedes agregar validaciones extra aquí si quieres

        // Mostrar alerta de registro
        alert("Usuario registrado correctamente ✅");

        // Redirigir a login.html después del alert
        window.location.href = "login.html";
    });
</script>

</body>
</html>
