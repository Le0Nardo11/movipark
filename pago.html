<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago | MoviPark</title>
<link rel="stylesheet" href="css/pago.css">
</head>

<body>

<div class="container">

<div class="circle">
<h1>MoviPark</h1>
</div>

<h2>Confirmar pago</h2>

<div class="resumen">

<p><strong>Estacionamiento:</strong> <span id="estacionamiento"></span></p>

<p><strong>Cajón:</strong> <span id="cajon"></span></p>

<p><strong>Llegada:</strong> <span id="llegada"></span></p>

<p><strong>Salida:</strong> <span id="salida"></span></p>

</div>

<h3>Total: $50 MXN</h3>

<input type="text" placeholder="Número de tarjeta">
<input type="text" placeholder="MM/AA">
<input type="text" placeholder="CVV">

<button onclick="pagar()">Pagar ahora</button>

</div>

<script>

document.getElementById("estacionamiento").textContent =
localStorage.getItem("estacionamiento")

document.getElementById("cajon").textContent =
localStorage.getItem("cajon")

document.getElementById("llegada").textContent =
localStorage.getItem("llegada")

document.getElementById("salida").textContent =
localStorage.getItem("salida")

function pagar(){

alert("Pago realizado con éxito ✅")

window.location.href = "service.html"

}

</script>

</body>
</html>
