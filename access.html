<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Movipark</title>
    <link rel="stylesheet" href="styless.css">
</head>
<body>

<div class="access-container">

    <!-- LOGO -->
    <div class="circle">
        <h1>Movipark</h1>
    </div>

    <!-- TÍTULO -->
    <h2 class="access-title">Ingresa tu correo</h2>

    <!-- EMAIL -->
    <input 
        type="email" 
        class="access-input" 
        placeholder="correo@ejemplo.com"
        required
    >

    <button class="btn-primary">
        Listo
    </button>

    <p class="or-text">o</p>

    <!-- PROVEEDORES -->
    <button class="provider-btn google">Continuar con Google</button>
    <button class="provider-btn microsoft">Continuar con Microsoft</button>
    <button class="provider-btn apple">Continuar con Apple</button>

</div>

</body>
</html>
