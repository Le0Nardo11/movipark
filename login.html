<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | Movipark</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login">

    <!-- HEADER -->
    <header class="home-header">
        <div class="circle logo-small">
            <h1>Movipark</h1>
        </div>
    </header>

    <!-- LOGIN -->
    <div class="login-container">

        <h2 class="login-title">Inicia sesión</h2>

        <form class="login-form">
            <label>Email</label>
            <input type="email" placeholder="Ingresa tu email" required>
            <label>Contraseña</label>
            <input type="password" placeholder="Ingresa tu contraseña" required>
            <button type="submit" class="btn-primary">Iniciar sesión</button>
        </form>

        <p class="or-text">o</p>

        <button class="provider-btn google">Continuar con Google</button>
        <button class="provider-btn microsoft">Continuar con Microsoft</button>
        <button class="provider-btn apple">Continuar con Apple</button>

        <p class="register-text">¿No tienes cuenta? <a href="register.html">Registrarse</a></p>

    </div>

</body>
</html>
