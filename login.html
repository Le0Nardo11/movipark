<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | Movipark</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login">

    <div class="login-container">

        <div class="circle">
            <h1>Movipark</h1>
        </div>

        <h2 class="login-title">Inicia sesión</h2>

        <form class="login-form">
            <label>Email</label>
            <input type="email" placeholder="Ingresa tu email" required>
            <label>Contraseña</label>
            <input type="password" placeholder="Ingresa tu contraseña" required>
            <button type="submit" class="btn-primary">Iniciar sesión</button>
        </form>

        <p class="or-text">o</p>

        <button class="btn-secondary provider-btn google">Continuar con Google</button>
        <button class="btn-secondary provider-btn microsoft">Continuar con Microsoft</button>
        <button class="btn-secondary provider-btn apple">Continuar con Apple</button>

        <p class="register-text">¿No tienes cuenta? <a href="register.html">Registrarse</a></p>

    </div>

</body>
</html>
