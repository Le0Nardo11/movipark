<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | MoviPark</title>
    <!-- Componente del logo -->
    <script src="js/logo-component.js" defer></script>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">
        <!-- Logo -->
        <movipark-logo></movipark-logo>

        <!-- Título -->
        <h2 class="login-title">Inicia sesión</h2>

        <!-- Formulario -->
        <form class="login-form">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Ingresa tu email" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Ingresa tu contraseña" required>

            <button type="submit" class="btn-primary">Iniciar sesión</button>
        </form>

        <p class="or-text">o</p>

        <!-- Invitado / Proveedores -->
        <button class="btn-secondary">Acceder como invitado</button>
        <button class="btn-secondary google">Continuar con Google</button>
        <button class="btn-secondary apple">Continuar con Apple</button>

        <!-- Registro -->
        <p class="register-text">
            ¿No tienes cuenta? 
            <a href="register.html">Registrarse</a>
        </p>
    </div>

</body>
</html>
