<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | MoviPark</title>
    <!-- CSS base y específico de login -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login">

    <div class="container login-container">

        <!-- LOGO -->
        <div class="circle">
            <h1>MoviPark</h1>
        </div>

        <!-- TÍTULO -->
        <h2 class="login-title">Inicia sesión</h2>

        <!-- FORMULARIO -->
        <form class="form login-form">

            <label>Email</label>
            <input type="email" placeholder="Ingresa tu email" required>

            <label>Contraseña</label>
            <input type="password" placeholder="Ingresa tu contraseña" required>

            <button type="submit" class="btn-primary">
                Iniciar sesión
            </button>

        </form>

        <p class="or-text">o</p>

        <button class="btn-secondary provider-btn google">
            Ingresar con Google
        </button>

        <button class="btn-secondary provider-btn microsoft">
            Ingresar con Microsoft
        </button>

        <button class="btn-secondary provider-btn apple">
            Ingresar con Apple
        </button>

        <!-- REGISTRO -->
        <p class="register-text">
            ¿No tienes cuenta?
            <a href="register.html">Registrarse</a>
        </p>

    </div>

</body>
</html>
