<!DOCTYPE html>
<html lang="es">
<head>

<link rel="stylesheet" href="css/menu.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reservar lugar | MoviPark</title>

<link rel="stylesheet" href="css/reservar.css">

</head>

<body>

<div id="menu-container"></div>

<script>
fetch("components/menu.html")
.then(response => response.text())
.then(data => {
document.getElementById("menu-container").innerHTML = data
})
</script>

<script src="js/menu.js"></script>

<div class="container">

<div class="logo-container">
<div class="circle">
<h1>MoviPark</h1>
</div>
</div>

<h2 class="page-title">Reservar lugar</h2>

<div class="recientes-container">

<p> recientes</p>

<div class="recientes-botones">
<button class="btn-reciente" onclick="buscarLugarPred('Perisur')">Perisur</button>
<button class="btn-reciente" onclick="buscarLugarPred('Mitikah')">Mitikah</button>
<button class="btn-reciente" onclick="buscarLugarPred('Antara')">Antara</button>
</div>

</div>

<div class="buscador-container">

<input type="text" id="buscador" placeholder="Buscar estacionamiento">

<button class="btn-primary" onclick="buscarLugar()">Buscar</button>

</div>

<div id="disponibilidad" class="disponibilidad"></div>

<div id="horario-container" class="horario-container" style="display:none;">

<div class="horario-box">
<label>Hora de llegada</label>
<input type="time" id="horaLlegada">
</div>

<div class="horario-box">
<label>Hora de salida</label>
<input type="time" id="horaSalida">
</div>

</div>

<h3 id="tituloMapa" style="display:none;">Selecciona tu cajón</h3>

<div id="mapa-estacionamiento" class="mapa"></div>

<button id="btnReservar" class="btn-reservar" style="display:none;">
Reservar ahora
</button>

</div>

<script src="js/reservar.js"></script>

</body>
</html>
